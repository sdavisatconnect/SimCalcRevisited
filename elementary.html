<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimCalc Animal World</title>
  <script type="module" crossorigin src="/SimCalcRevisited/assets/elementary-X_g9Mn8M.js"></script>
  <link rel="modulepreload" crossorigin href="/SimCalcRevisited/assets/StudentResultsOverlay-BCQ2ke_E.js">
  <link rel="stylesheet" crossorigin href="/SimCalcRevisited/assets/StudentResultsOverlay-CoZNc6Cw.css">
  <link rel="stylesheet" crossorigin href="/SimCalcRevisited/assets/elementary-CNLIekhr.css">
</head>
<body class="elementary-edition">
  <div class="app-shell">
    <!-- Actor Palette Bar (top, slim) -->
    <div class="palette-bar" id="palette-bar"></div>

    <!-- Main Area: Workspace + Right Sidebar -->
    <div class="main-area">
      <!-- Workspace (panels live here) -->
      <div class="workspace" id="workspace"></div>

      <!-- Right-side Tool Sidebar -->
      <div class="tool-sidebar" id="tool-sidebar"></div>
    </div>

    <!-- Playback Controls (bottom) -->
    <div class="controls" id="controls">
      <button id="btn-reset" data-tooltip="Reset">&#9198;</button>
      <button id="btn-step-back" data-tooltip="Step Back">&#9664;&#9646;</button>
      <button id="btn-play" data-tooltip="Play / Pause">&#9654;</button>
      <button id="btn-step-fwd" data-tooltip="Step Forward">&#9646;&#9654;</button>
      <span class="time-display">Time: <span id="time-value">0.0</span>s</span>
      <label class="speed-control">
        Speed:
        <input type="range" id="speed-slider" min="0.25" max="3" step="0.25" value="1">
        <span id="speed-value">1&times;</span>
      </label>
      <div class="controls-spacer"></div>
      <button id="btn-save" class="io-btn" data-tooltip="Save">&#128190;</button>
      <button id="btn-load" class="io-btn" data-tooltip="Open">&#128194;</button>
      <button id="btn-lang" class="io-btn" data-tooltip="Language">EN</button>
      <button id="btn-new" class="io-btn" data-tooltip="New">&#128196;</button>
    </div>
  </div>
</body>
</html>
